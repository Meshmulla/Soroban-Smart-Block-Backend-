name: Wave Issue
description: A scoped task ready for Drips Wave contributors
labels: ["Stellar Wave", "good first issue"]
body:
  - type: markdown
    attributes:
      value: |
        This issue is part of the **Stellar Wave Program** on [Drips](https://www.drips.network/wave/stellar).
        Contributors: apply via the Drips Wave app, then submit a PR.
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why does this need to be done?
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Exactly what needs to be implemented or fixed.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know this is done?
      placeholder: "- [ ] ...\n- [ ] Tests pass\n- [ ] No TypeScript errors"
    validations:
      required: true
  - type: dropdown
    id: complexity
    attributes:
      label: Complexity
      options:
        - Trivial (100 pts)
        - Medium (150 pts)
        - High (200 pts)
    validations:
      required: true
